<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>港股 / A股 / 美股 · 估值气泡缸</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  html,body{margin:0;height:100%;background:#0a0e1a;color:#e8eef7;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}
  #wrap{position:relative;width:100vw;height:100vh}
  canvas{display:block}
  #hd{position:absolute;top:16px;left:24px;z-index:5;pointer-events:none}
  #hd h1{margin:0;font-size:21px;font-weight:700;letter-spacing:1px}
  #hd p{margin:4px 0 0;font-size:12px;color:#8da2c0}
  #legend{position:absolute;top:16px;right:24px;z-index:5;font-size:12px;
    background:rgba(15,22,40,.6);padding:11px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.08)}
  #legend .row{display:flex;align-items:center;gap:8px;margin:4px 0}
  .swatch{width:12px;height:12px;border-radius:50%}
  .ring{width:12px;height:12px;border-radius:50%;box-sizing:border-box;background:transparent}
  #tip{position:absolute;z-index:10;pointer-events:none;display:none;
    background:rgba(10,15,28,.96);border:1px solid rgba(120,160,220,.4);border-radius:8px;
    padding:9px 12px;font-size:12.5px;line-height:1.6;box-shadow:0 6px 24px rgba(0,0,0,.5);max-width:260px}
  #tip b{font-size:14px;color:#fff}.dim{color:#8da2c0}.pe{color:#ffd27d}
  .badge{display:inline-block;padding:0 6px;border-radius:4px;font-size:11px;margin-left:6px;vertical-align:1px}
  .badge.hk{background:rgba(90,200,250,.18);color:#5ac8fa;border:1px solid rgba(90,200,250,.45)}
  .badge.a{background:rgba(255,159,67,.16);color:#ff9f43;border:1px solid rgba(255,159,67,.45)}
  .badge.us{background:rgba(192,132,252,.16);color:#c084fc;border:1px solid rgba(192,132,252,.45)}
  #ctl{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;z-index:6;
    background:rgba(15,22,40,.75);border:1px solid rgba(255,255,255,.1);border-radius:12px;
    padding:10px 16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(6px);flex-wrap:wrap;justify-content:center}
  #ctl button{background:#2b3a55;color:#e8eef7;border:none;border-radius:7px;
    padding:6px 12px;font-size:13px;cursor:pointer}
  #ctl button:hover{background:#37496a}
  #mkt{display:flex;gap:6px;padding-right:12px;border-right:1px solid rgba(255,255,255,.12)}
  #mkt button{background:transparent;color:#9fb4d4;border:1px solid transparent}
  #mkt button.on{background:#2b3a55;color:#fff;border-color:rgba(140,180,240,.35)}
  #ind{background:#1a2438;color:#cfe1ff;border:1px solid rgba(140,180,240,.25);border-radius:7px;
    padding:6px 8px;font-size:13px;max-width:170px;outline:none;cursor:pointer}
  #date{font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;min-width:96px;text-align:center}
  #slider{width:min(38vw,440px)}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:20;font-size:15px;color:#9fb4d4;background:#0a0e1a}
  /* 搜索:隐形输入,直接打在缸口椭圆里——无边框无背景,提示文字仅悬停/聚焦时淡淡浮现 */
  #search{position:absolute;top:156px;left:50%;transform:translateX(-50%);z-index:6;
    width:340px;padding:2px 0;font-size:14px;color:#e8eef7;text-align:center;
    background:transparent;border:none;outline:none;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
  #search::placeholder{color:transparent;transition:color .2s}
  #search:hover::placeholder,#search:focus::placeholder{color:#4c5f7e}
</style>
</head>
<body>
<div id="wrap">
  <div id="hd">
    <h1 id="title">港股市值 · 估值气泡缸</h1>
    <p>气泡大小 = 总市值(统一折算美元) &nbsp;|&nbsp; 越往上 PE 越高(越贵),缸底灰色为亏损股</p>
    <p id="stat" class="dim"></p>
  </div>
  <div id="legend">
    <div class="row"><span class="swatch" style="background:#ef5b25"></span>高 PE(贵 / 成长)</div>
    <div class="row"><span class="swatch" style="background:#5bd94a"></span>中 PE</div>
    <div class="row"><span class="swatch" style="background:#3f6fe0"></span>低 PE(便宜 / 价值)</div>
    <div class="row"><span class="swatch" style="background:#6b7a90"></span>亏损(PE≤0)</div>
    <div class="row dim">⌖ 圆面积 ∝ 市值 · 高度 ∝ PE</div>
    <div class="row dim" style="max-width:185px">市值统一折算:1 USD =<br>7.80 HKD = 7.15 CNY</div>
    <div id="mixrows" style="display:none">
      <div class="row"><span class="ring" style="border:2.5px solid #5ac8fa"></span>港股(描边)</div>
      <div class="row"><span class="ring" style="border:2.5px solid #ff9f43"></span>A股(描边)</div>
      <div class="row"><span class="ring" style="border:2.5px solid #c084fc"></span>美股(描边)</div>
    </div>
  </div>
  <canvas id="cv"></canvas>
  <input id="search" placeholder="⌕ 搜索 ↵" autocomplete="off" spellcheck="false">
  <div id="tip"></div>
  <div id="ctl">
    <div id="mkt">
      <button data-mode="hk" class="on">港股</button>
      <button data-mode="a">A股</button>
      <button data-mode="us">美股</button>
      <button data-mode="all">全部同缸</button>
    </div>
    <select id="ind"><option value="all">全部行业</option></select>
    <button id="play">▶ 播放</button>
    <span id="date">—</span>
    <input id="slider" type="range" min="0" max="0" value="0" step="1">
  </div>
  <div id="loading">正在加载数据…</div>
</div>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d'), tip=document.getElementById('tip');
let W,H,dpr=Math.min(window.devicePixelRatio||1,2);
let vat={}, nodes=[], dates=[], idx=0, playing=false, timer=null;
let mode='hk';                                  // 'hk' | 'a' | 'us' | 'all'  默认港股
const byDate={HK:{}, A:{}, US:{}};              // byDate[mkt][date] = Map(code -> rec)
const USD_PER={HK:1/7.80, A:1/7.15, US:1};      // 市值折算成美元(亿)
const MKTS={hk:['HK'], a:['A'], us:['US'], all:['HK','A','US']};   // 各模式包含的市场
const TITLES={hk:'港股市值 · 估值气泡缸', a:'A股市值 · 估值气泡缸',
              us:'美股市值 · 估值气泡缸', all:'港股 + A股 + 美股 · 估值气泡缸'};
const MKT_LABEL={HK:'港股', A:'A股', US:'美股'};
const MKT_CUR={HK:'HKD', A:'CNY', US:'USD'};
const MIX_STROKE={HK:'rgba(90,200,250,0.95)', A:'rgba(255,159,67,0.95)', US:'rgba(192,132,252,0.95)'};
const inMode=n=> MKTS[mode].includes(n.mkt);
let industry='all';                              // 行业筛选,'all' = 全部
const indOf=o=> o.ind || '未分类';
const inIndustry=o=> industry==='all' || indOf(o)===industry;
// 该日期在当前模式下有没有数据(各市更新时间不同,日期并集里会有单边空缺);同缸模式要求所含市场当天都有
const hasData=d=> MKTS[mode].every(m=>!!byDate[m][d]);
function latestIdxWithData(){
  for(let i=dates.length-1;i>=0;i--) if(hasData(dates[i])) return i;
  for(let i=dates.length-1;i>=0;i--) if(MKTS[mode].some(m=>!!byDate[m][dates[i]])) return i;  // 兜底:任一市场有数据
  return dates.length-1;
}

function computeVat(){
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // 顶部留出标题区(标题+两行说明约 105px),再加缸口椭圆半高,避免文字压在缸口上
  const padX=Math.max(24,W*0.04), top=168, bot=H-86;
  vat={x0:padX,x1:W-padX,top,bot,rim:top+30}; vat.w=vat.x1-vat.x0;
}

// ---- 数据加载 ----
async function loadManifest(path){
  try{ const r=await fetch(path+'?t='+Date.now()); if(!r.ok) return [];
    return (await r.json()).dates||[]; }catch(e){ return []; }
}
async function load(){
  const [hkDates,aDates,usDates]=await Promise.all([
    loadManifest('data/manifest.json'), loadManifest('data/manifest_a.json'),
    loadManifest('data/manifest_us.json')]);
  dates=[...new Set([...hkDates,...aDates,...usDates])].sort().slice(-90);   // 各市日期并集,最多 90 天
  if(!dates.length) throw '无可用数据';
  const jobs=[];
  for(const d of dates){
    if(hkDates.includes(d)) jobs.push(fetch('data/'+d+'.json').then(r=>r.json()).then(a=>{byDate.HK[d]=new Map(a.map(o=>[o.code,o]));}).catch(()=>{}));
    if(aDates.includes(d))  jobs.push(fetch('data/a-'+d+'.json').then(r=>r.json()).then(a=>{byDate.A[d]=new Map(a.map(o=>[o.code,o]));}).catch(()=>{}));
    if(usDates.includes(d)) jobs.push(fetch('data/us-'+d+'.json').then(r=>r.json()).then(a=>{byDate.US[d]=new Map(a.map(o=>[o.code,o]));}).catch(()=>{}));
  }
  await Promise.all(jobs);
  // 全部出现过的公司并集做节点,key = 市场 + 代码
  const seen=new Map();
  for(const mkt of ['HK','A','US']) for(const d in byDate[mkt])
    byDate[mkt][d].forEach((o,code)=>{ const k=mkt+'|'+code;
      if(!seen.has(k)) seen.set(k,{mkt,code,name:o.name}); });
  nodes=[...seen.values()];
  computeVat();
  nodes.forEach(n=>{ n.x=(vat.x0+vat.x1)/2+(Math.random()-0.5)*vat.w*0.8; n.y=vat.rim+Math.random()*(vat.bot-vat.rim); });
  document.getElementById('loading').style.display='none';
  setupUI();
  // URL 带 #a / #us / #all 时直接以对应模式打开(可分享链接;#both 兼容旧链接)
  let h=location.hash.replace('#','');
  if(h==='both') h='all';
  if(MKTS[h] && h!=='hk'){ mode=h;
    document.querySelectorAll('#mkt button').forEach(b=>b.classList.toggle('on',b.dataset.mode===h)); }
  buildIndOptions();
  idx=latestIdxWithData(); applyDate(true);
  startSim();
}

// ---- 比例尺 ----
let rScale, yScale, colScale, peLo=1, peHi=150;
function buildScales(){
  // 当前模式涉及的市场,跨全部日期取最大美元市值 -> 同一模式内气泡大小跨日期可比
  const allMC=[], allPE=[];
  for(const mkt of MKTS[mode]){
    for(const d in byDate[mkt]) byDate[mkt][d].forEach(o=>{
      if(!inIndustry(o)) return;                 // 行业筛选时刻度只看同行业,放大组内差异
      allMC.push(o.mc*USD_PER[mkt]); if(o.pe>0) allPE.push(o.pe); });
  }
  if(!allMC.length) return;                      // 该行业无数据,保持旧刻度(此时无可见气泡)
  // 最大气泡半径随缸宽缩放,大屏不至于显得空;同缸节点多,整体再缩一档
  const rMax=Math.max(40,Math.min(72,vat.w*0.036))*(mode==='all'?0.8:1);
  rScale=d3.scaleSqrt().domain([0,d3.max(allMC)]).range([1.8, rMax]);
  // PE 高度/配色刻度随当前模式的实际分布自适应(2%~98% 分位数),
  // 否则 A 股 PE 普遍偏高,固定 1~150 的刻度会把气泡全挤到缸顶
  allPE.sort((a,b)=>a-b);
  peLo=Math.max(1, d3.quantileSorted(allPE,0.02)||1);
  peHi=Math.min(500, d3.quantileSorted(allPE,0.98)||150);
  if(peHi<peLo*2) peHi=peLo*2;
  const yTop=vat.rim+40, ySedTop=vat.bot-(vat.bot-vat.rim)*0.20;
  yScale=d3.scaleLog().domain([peLo,peHi]).range([ySedTop-20,yTop]).clamp(true);
  colScale=d3.scaleSequential(t=>d3.interpolateTurbo(0.12+0.78*t)).domain([Math.log10(peLo),Math.log10(peHi)]);
}
function peToY(pe){ const ySedTop=vat.bot-(vat.bot-vat.rim)*0.20;
  return pe>0? yScale(Math.max(peLo,Math.min(peHi,pe))) : ySedTop+(vat.bot-ySedTop)*0.55; }
function colorOf(n){
  return n.loss ? '#6b7a90' : colScale(Math.log10(Math.max(peLo,Math.min(peHi,n.pe))));
}

// ---- 切换日期 / 模式:更新每个节点状态,再加热力导向自然移动 ----
function applyDate(initial){
  buildScales();
  const date=dates[idx];
  let nViz=0,nLoss=0; const byMkt={HK:0,A:0,US:0};
  for(const n of nodes){
    const cur=byDate[n.mkt][date], o=cur&&cur.get(n.code);
    if(!o||!inMode(n)||!inIndustry(o)){ n.viz=false; n.r=0; continue; }
    n.viz=true; nViz++; byMkt[n.mkt]++;
    n.pe=o.pe; n.mc=o.mc; n.rev=o.rev; n.profit=o.profit; n.cur=o.cur; n.name=o.name; n.ind=o.ind||'';
    n.mcUSD=o.mc*USD_PER[n.mkt];
    n.r=rScale(n.mcUSD); n.ty=peToY(o.pe); n.loss=o.pe<=0; if(n.loss)nLoss++;
    const prev= idx>0 ? byDate[n.mkt][dates[idx-1]] : null, p=prev&&prev.get(n.code);
    n.chg = p? (o.mc-p.mc)/p.mc : null;
  }
  computeLabels();
  document.getElementById('date').textContent=date;
  document.getElementById('slider').value=idx;
  document.getElementById('title').textContent=TITLES[mode];
  document.getElementById('mixrows').style.display = mode==='all' ? '' : 'none';
  let s=`${date}  ·  共 ${nViz} 家  ·  盈利 ${nViz-nLoss}  ·  亏损 ${nLoss}`;
  if(industry!=='all') s+=`  ·  ${industry}`;
  if(mode==='all') s+=`  ·  `+MKTS.all.map(m=>`${MKT_LABEL[m]} ${byMkt[m]}`).join(' / ');
  if(nViz===0) s=`${date}  ·  该日暂无数据`;
  document.getElementById('stat').textContent=s;
  // 模拟只放当前可见节点:隐藏市场的节点位置冻结,否则它们会被力场吸成一个点,
  // 切换市场时 5000+ 个重叠节点展开极慢,看起来全挤在一起
  if(sim){ sim.nodes(nodes.filter(n=>n.viz)); sim.alpha(initial?1:0.55).restart(); }
}
function setMode(m){
  mode=m;
  document.querySelectorAll('#mkt button').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  industry='all'; buildIndOptions();                  // 行业列表随市场重建
  if(!hasData(dates[idx])) idx=latestIdxWithData();   // 当前日期在新模式下没数据就跳到最近有数据的一天
  applyDate(false);
  if(sim) sim.alpha(0.9).restart();
}

// 行业下拉:统计当前模式各行业公司数(取各市场最近一天),按数量排序
function buildIndOptions(){
  const cnt=new Map();
  for(const mkt of MKTS[mode]){
    let last=null;
    for(let i=dates.length-1;i>=0;i--){ if(byDate[mkt][dates[i]]){ last=dates[i]; break; } }
    if(!last) continue;
    byDate[mkt][last].forEach(o=>{ const k=indOf(o); cnt.set(k,(cnt.get(k)||0)+1); });
  }
  const sel=document.getElementById('ind');
  const items=[...cnt.entries()].sort((a,b)=>b[1]-a[1]);
  sel.innerHTML='<option value="all">全部行业</option>'+
    items.map(([k,v])=>`<option value="${k}">${k} (${v})</option>`).join('');
  sel.value='all';
}

// 计算每个气泡能否在圈内放下名字:能放下就记字号 n.lf,放不下则 lf=0
function computeLabels(){
  for(const n of nodes){
    n.lf=0;
    if(!n.viz || n.r<11) continue;
    const nm=n.name.replace(/－.+$/,'');
    let fs=Math.min(15, n.r*0.55);
    ctx.font=fs+'px "PingFang SC","Microsoft YaHei",sans-serif';
    const w=ctx.measureText(nm).width;
    if(w > 2*n.r-6) fs *= (2*n.r-6)/w;
    if(fs>=7.5){ n.lf=fs; n.lname=nm; }
  }
}

// ---- 力导向 ----
let sim=null;
function boundary(){ for(const n of nodes){ if(!n.viz)continue; const r=n.r+1.2;
  if(n.x<vat.x0+r)n.x=vat.x0+r; if(n.x>vat.x1-r)n.x=vat.x1-r;
  if(n.y<vat.rim+r)n.y=vat.rim+r; if(n.y>vat.bot-r)n.y=vat.bot-r; } }
function startSim(){
  const cx=()=> (vat.x0+vat.x1)/2;
  sim=d3.forceSimulation(nodes.filter(n=>n.viz))
    .force('y',d3.forceY(n=>n.ty||vat.rim).strength(0.16))
    .force('x',d3.forceX(cx).strength(0.012))
    .force('collide',d3.forceCollide(n=>n.r+1).strength(0.9).iterations(2))
    .alpha(1).alphaDecay(0.015).alphaMin(0.002)
    .on('tick',()=>{boundary();draw();});
}

function fmtMC(v){ return v>=10000?(v/10000).toFixed(2)+' 万亿':v.toFixed(0)+' 亿'; }
function fmtBig(v){ if(v==null)return '—'; const a=Math.abs(v);
  return a>=1e8?(v/1e8).toFixed(1)+' 亿':a>=1e4?(v/1e4).toFixed(1)+' 万':v.toFixed(0); }
function fmtPct(p){ if(p==null)return ''; const s=(p*100).toFixed(2); return (p>=0?'+':'')+s+'%'; }

function drawVat(){ const {x0,x1,rim,bot}=vat;
  const g=ctx.createLinearGradient(0,rim,0,bot);
  g.addColorStop(0,'rgba(60,120,200,0.10)');g.addColorStop(1,'rgba(30,70,140,0.22)');
  ctx.fillStyle=g; ctx.beginPath();
  ctx.moveTo(x0,rim);ctx.lineTo(x0,bot-30);ctx.quadraticCurveTo(x0,bot,x0+30,bot);
  ctx.lineTo(x1-30,bot);ctx.quadraticCurveTo(x1,bot,x1,bot-30);ctx.lineTo(x1,rim);
  ctx.closePath();ctx.fill();
  const sedTop=bot-(bot-rim)*0.20;
  ctx.fillStyle='rgba(70,80,100,0.10)';ctx.beginPath();
  ctx.moveTo(x0,sedTop);ctx.lineTo(x1,sedTop);ctx.lineTo(x1,bot-30);
  ctx.quadraticCurveTo(x1,bot,x1-30,bot);ctx.lineTo(x0+30,bot);
  ctx.quadraticCurveTo(x0,bot,x0,bot-30);ctx.closePath();ctx.fill();
}
function drawGlass(){ const {x0,x1,top,bot}=vat;
  ctx.lineWidth=2.5;ctx.strokeStyle='rgba(150,190,240,0.55)';ctx.beginPath();
  ctx.moveTo(x0,top);ctx.lineTo(x0,bot-30);ctx.quadraticCurveTo(x0,bot,x0+30,bot);
  ctx.lineTo(x1-30,bot);ctx.quadraticCurveTo(x1,bot,x1,bot-30);ctx.lineTo(x1,top);ctx.stroke();
  ctx.beginPath();ctx.ellipse((x0+x1)/2,top,(x1-x0)/2,15,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,210,250,0.75)';ctx.stroke();
  ctx.fillStyle='rgba(120,170,230,0.08)';ctx.fill();
  ctx.beginPath();ctx.moveTo(x0+18,top+30);ctx.lineTo(x0+18,bot-40);
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=8;ctx.stroke();
}
function draw(){
  ctx.clearRect(0,0,W,H); drawVat();
  const mix = mode==='all';
  for(const n of nodes){ if(!n.viz||n.r<=0)continue;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=colorOf(n);ctx.globalAlpha=n.loss?0.55:0.82;ctx.fill();
    if(n.r>5){
      ctx.globalAlpha = mix?0.85:0.5;
      ctx.lineWidth = mix?1.4:0.8;
      // 同缸模式用描边色区分市场:港股蓝、A股橙、美股紫
      ctx.strokeStyle = mix ? MIX_STROKE[n.mkt] : 'rgba(255,255,255,0.5)';
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  ctx.fillStyle='rgba(255,255,255,0.96)';ctx.textAlign='center';ctx.textBaseline='middle';
  for(const n of nodes){ if(n.viz&&n.lf){ ctx.font=n.lf+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(n.lname,n.x,n.y);} }
  // 搜索定位:虚线圈 + 名字标牌(气泡太小时也能看清)
  if(hl && hl.viz){
    const rr=Math.max(hl.r+7,16);
    ctx.beginPath();ctx.arc(hl.x,hl.y,rr,0,Math.PI*2);
    ctx.strokeStyle='#ffd84d';ctx.lineWidth=2.5;ctx.setLineDash([7,5]);ctx.stroke();ctx.setLineDash([]);
    const txt=hl.name+(hlMatches.length>1?`  ${hlIdx+1}/${hlMatches.length}`:'');
    ctx.font='13px "PingFang SC","Microsoft YaHei",sans-serif';
    const tw=ctx.measureText(txt).width, ty=hl.y-rr-16;
    ctx.fillStyle='rgba(10,15,28,.92)';
    ctx.fillRect(hl.x-tw/2-8,ty-11,tw+16,22);
    ctx.strokeStyle='rgba(255,216,77,.7)';ctx.lineWidth=1;ctx.strokeRect(hl.x-tw/2-8,ty-11,tw+16,22);
    ctx.fillStyle='#ffd84d';ctx.fillText(txt,hl.x,ty);
  }
  drawGlass();
}

// ---- UI ----
function setupUI(){
  const sl=document.getElementById('slider');
  sl.max=dates.length-1; sl.value=dates.length-1;
  sl.oninput=()=>{ idx=+sl.value; applyDate(false); };
  document.getElementById('play').onclick=togglePlay;
  document.querySelectorAll('#mkt button').forEach(b=>{
    b.onclick=()=>{ if(b.dataset.mode!==mode) setMode(b.dataset.mode); };
  });
  document.getElementById('ind').onchange=e=>{
    industry=e.target.value;
    applyDate(false);
    if(sim) sim.alpha(0.9).restart();
  };
}
function togglePlay(){
  const btn=document.getElementById('play');
  if(playing){ clearInterval(timer); playing=false; btn.textContent='▶ 播放'; return; }
  if(dates.length<2){ return; }
  playing=true; btn.textContent='⏸ 暂停';
  if(idx>=dates.length-1) idx=0;
  timer=setInterval(()=>{ if(idx>=dates.length-1){ clearInterval(timer);playing=false;btn.textContent='▶ 播放';return; }
    idx++; applyDate(false); }, 1400);
}

// ---- 搜索定位 ----
let hl=null, hlMatches=[], hlIdx=0, hlKey='';
const si=document.getElementById('search');
si.addEventListener('mouseenter',()=>si.focus());   // 鼠标移上去即可打字
si.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ si.value=''; hl=null; hlMatches=[]; hlKey=''; draw(); si.blur(); return; }
  if(e.key!=='Enter') return;
  const q=si.value.trim().toLowerCase();
  if(!q){ hl=null; hlMatches=[]; hlKey=''; draw(); return; }
  if(q===hlKey && hlMatches.length){            // 同一关键词再按 Enter:在多个匹配间轮换
    hlIdx=(hlIdx+1)%hlMatches.length;
  }else{
    const vis=nodes.filter(n=>n.viz);
    const exact=vis.filter(n=>n.code.toLowerCase()===q||n.name.toLowerCase()===q);
    const fuzzy=vis.filter(n=>!exact.includes(n)&&(n.name.toLowerCase().includes(q)||n.code.toLowerCase().includes(q)))
                   .sort((a,b)=>b.mcUSD-a.mcUSD);
    hlMatches=[...exact,...fuzzy]; hlIdx=0; hlKey=q;
  }
  hl=hlMatches[hlIdx]||null;
  draw();
});
si.addEventListener('input',()=>{ if(!si.value.trim()){ hl=null; hlMatches=[]; hlKey=''; draw(); } });

// ---- 悬停 ----
cv.addEventListener('mousemove',e=>{ const mx=e.clientX,my=e.clientY; let hit=null,best=1e9;
  for(const n of nodes){ if(!n.viz)continue; const dx=n.x-mx,dy=n.y-my,dd=dx*dx+dy*dy;
    if(dd<(n.r+2)*(n.r+2)&&dd<best){best=dd;hit=n;} }
  if(hit){ tip.style.display='block';tip.style.left=Math.min(mx+14,W-270)+'px';tip.style.top=(my+14)+'px';
    const badge = `<span class="badge ${hit.mkt.toLowerCase()}">${MKT_LABEL[hit.mkt]}</span>`;
    const mcCur = MKT_CUR[hit.mkt];
    const orig = mcCur==='USD' ? '' : ` <span class="dim">(${fmtMC(hit.mc)} ${mcCur})</span>`;
    const chg = hit.chg==null? '' : ` <span class="dim">较前一日 ${fmtPct(hit.chg)}</span>`;
    const parts=[];
    if(hit.rev!=null||hit.profit!=null) parts.push(`营收 ${fmtBig(hit.rev)} · 净利 ${fmtBig(hit.profit)} ${hit.cur||''}`);
    if(hit.ind) parts.push(hit.ind);
    const fin = parts.length? `<br><span class="dim">${parts.join('  ·  ')}</span>` : '';
    tip.innerHTML=`<b>${hit.name}</b> <span class="dim">${hit.code}</span>${badge}<br>`+
      `市值:<b>${fmtMC(hit.mcUSD)}</b> USD${orig}${chg}<br>`+
      `PE(TTM):<span class="pe">${hit.pe}</span>${hit.pe<=0?' <span class="dim">(亏损)</span>':''}`+fin;
  } else tip.style.display='none';
});
cv.addEventListener('mouseleave',()=>tip.style.display='none');

addEventListener('resize',()=>{ computeVat(); applyDate(false);
  if(sim) sim.force('x',d3.forceX((vat.x0+vat.x1)/2).strength(0.012)).alpha(0.5).restart(); });

load().catch(e=>{ document.getElementById('loading').textContent='加载失败:'+e; });
</script>
